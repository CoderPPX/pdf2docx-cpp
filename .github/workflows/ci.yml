name: cpp_pdf2docx_ci

on:
  push:
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-debug
          - os: macos-latest
            preset: macos-debug
          - os: windows-latest
            preset: windows-msvc-debug
    defaults:
      run:
        working-directory: cpp_pdf2docx
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel 4

      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  windows-mingw:
    name: windows-latest / windows-mingw-debug
    runs-on: windows-latest
    defaults:
      run:
        working-directory: cpp_pdf2docx
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Configure
        run: cmake --preset windows-mingw-debug

      - name: Build
        run: cmake --build --preset windows-mingw-debug --parallel 4

      - name: Test
        run: ctest --preset windows-mingw-debug
