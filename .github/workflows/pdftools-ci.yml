name: cpp_pdftools_ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-debug
          - os: windows-latest
            preset: windows-msvc-debug
    defaults:
      run:
        working-directory: cpp_pdftools
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel 4

      - name: Test
        run: ctest --preset ${{ matrix.preset }}
